schemaVersion: "2"
kind: sandbox
name: legacy-kit
displayName: Legacy Kit
description: exercises every v1 → v2 transform at once
sandbox:
    image: example/test:latest
    entrypoint:
        - test-bin
    command:
        default:
            - --flag
        interactive:
            - --interactive
agentInstructions:
    filename: TEST.md
    content: |
        Some legacy memory content.
        Should be carried over verbatim under agentContext after migration.
permissions:
    network:
        allow:
            - api.anthropic.com:443
            - registry.npmjs.org
        deny:
            - malware.example.com
ports:
    - container: 8080
      protocol: tcp
      name: web
credentials:
    - service: anthropic
      apiKey:
        name: ANTHROPIC_API_KEY
        proxyManaged: true
        inject:
            - domain: api.anthropic.com
              header: x-api-key
              format: '%s'
            - domain: console.anthropic.com
              header: x-api-key
              format: '%s'
      oauth:
        tokenEndpoint:
            host: platform.claude.com
            path: /v1/oauth/token
        sentinels:
            accessToken: sk-ant-oat01-proxy-managed
            refreshToken: sk-ant-ort01-proxy-managed
        credentialFile:
            path: ~/.claude/.credentials.json
            structure:
                claudeAiOauth:
                    accessToken: '{{.AccessToken}}'
                    expiresAt: '{{.ExpiresAt}}'
                    refreshToken: '{{.RefreshToken}}'
environment:
    variables:
        IS_SANDBOX: "1"
setup:
    install:
        - command: echo install
          user: "0"
          description: Install step
