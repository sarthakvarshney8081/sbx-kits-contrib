name: Kit TCK

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  APP_NAME: sbx-kits-contrib-tck

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      kits: ${{ steps.collect.outputs.kits }}
      tck-changed: ${{ steps.filter.outputs.tck }}
      spec-changed: ${{ steps.filter.outputs.spec }}
      scripts-changed: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate filters
        id: filter-setup
        run: |
          filters=""
          # Add a filter for each kit directory (spec.yaml or spec.yml)
          for f in */spec.yaml */spec.yml; do
            [ -f "$f" ] || continue
            kit=$(dirname "$f")
            filters=$(printf '%s\n%s: "%s/**"' "$filters" "$kit" "$kit")
          done
          # Add filters for shared packages that should trigger all kits
          filters=$(printf '%s\ntck: "tck/**"\nspec: "spec/**"\nscripts: "scripts/**"' "$filters")

          echo "filters<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filters" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: ${{ steps.filter-setup.outputs.filters }}
          # Use local git diff instead of GitHub API — works for fork PRs
          # which have restricted GITHUB_TOKEN permissions.
          token: ""

      - name: Collect kits to test
        id: collect
        run: |
          # If tck/ or spec/ changed, run all kits
          tck_changed="${{ steps.filter.outputs.tck }}"
          spec_changed="${{ steps.filter.outputs.spec }}"

          if [ "$tck_changed" = "true" ] || [ "$spec_changed" = "true" ]; then
            kits=$(for f in */spec.yaml */spec.yml; do [ -f "$f" ] && dirname "$f"; done | sort -u | jq -R . | jq -sc .)
          else
            # Only kits that changed
            changes='${{ steps.filter.outputs.changes }}'
            kits=$(echo "$changes" | jq -r '.[]' | grep -vE '^(tck|spec|scripts)$' | jq -R . | jq -sc .)
          fi

          echo "kits=${kits:-[]}" >> "$GITHUB_OUTPUT"
          echo "Detected kits to test: $kits"

  test-kit:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.kits != '[]' &&
      needs.detect-changes.outputs.kits != 'null' &&
      needs.detect-changes.outputs.kits != ''
    strategy:
      fail-fast: false
      matrix:
        kit: ${{ fromJson(needs.detect-changes.outputs.kits) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run TCK for ${{ matrix.kit }}
        # Invoke the same wrapper kit authors use locally so CI and the
        # local workflow stay 1:1. Pass the matrix kit name as a positional
        # arg (the script resolves it against the repo root) and forward
        # `-timeout 30m` to `go test`.
        run: ./scripts/test-kit.sh "${{ matrix.kit }}" -timeout 30m

  test-tck:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.tck-changed == 'true' ||
      needs.detect-changes.outputs.spec-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run TCK self-tests
        run: go test -v -timeout 30m -count=1 ./spec/... ./tck/...

  test-scripts:
    needs: detect-changes
    if: needs.detect-changes.outputs.scripts-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run scripts tests
        run: go test -v -timeout 10m -count=1 ./scripts/...

  # End-to-end tests run against two sbx channels via the reusable e2e.yml:
  #
  #   * e2e-release — the last tagged sbx release. This is the channel users
  #     have today, so it GATES the PR: the stable `e2e` job below requires it.
  #   * e2e-nightly — the rolling nightly build, so kits are exercised against
  #     what sbx will ship next. Informational only — its result never feeds
  #     the `e2e` gate, so a broken nightly shows red on the PR but does NOT
  #     block merge.
  #
  # Both are skipped for fork PRs (Docker Hub secrets are not exposed there).
  e2e-release:
    needs: detect-changes
    if: >-
      (github.event_name == 'push' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      needs.detect-changes.outputs.kits != '[]' &&
      needs.detect-changes.outputs.kits != 'null' &&
      needs.detect-changes.outputs.kits != ''
    uses: ./.github/workflows/e2e.yml
    with:
      kits: ${{ needs.detect-changes.outputs.kits }}
      channel: release
    secrets: inherit

  e2e-nightly:
    needs: detect-changes
    if: >-
      (github.event_name == 'push' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      needs.detect-changes.outputs.kits != '[]' &&
      needs.detect-changes.outputs.kits != 'null' &&
      needs.detect-changes.outputs.kits != ''
    uses: ./.github/workflows/e2e.yml
    with:
      kits: ${{ needs.detect-changes.outputs.kits }}
      channel: nightly
    secrets: inherit

  # Stable gate for branch protection. Configure the repo's required status
  # check to be `e2e` (not the dynamic `e2e-release (<kit>)` matrix legs,
  # whose names change per PR, and NOT `e2e-nightly`). It reflects ONLY the
  # release leg: it fails iff release e2e failed or was cancelled, and passes
  # when release succeeded or was skipped (fork PRs / no kits changed). It
  # always runs so a required check is never left pending.
  e2e:
    needs: [e2e-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require the release e2e leg
        run: |
          result="${{ needs.e2e-release.result }}"
          echo "release e2e result: ${result}"
          case "${result}" in
            success|skipped) echo "release e2e gate passed"; exit 0 ;;
            *)               echo "release e2e gate failed"; exit 1 ;;
          esac

  # Surface the nightly leg's outcome loudly without blocking. Because
  # e2e-nightly is informational, its red/green can be easy to miss; this
  # job echoes the state into the run log and writes a banner to the
  # GitHub Step Summary so the health of sbx nightly is visible at a glance.
  # It always exits 0 — reporting the state must never affect mergeability.
  e2e-nightly-report:
    needs: [e2e-nightly]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report nightly e2e state
        run: |
          result="${{ needs.e2e-nightly.result }}"
          echo "nightly e2e result: ${result}"
          case "${result}" in
            success)   emoji="✅"; msg="sbx **nightly** e2e passed — kits compose against the next sbx." ;;
            failure)   emoji="🌙"; msg="sbx **nightly** e2e failed — informational only, does **not** block this PR. Track the sbx nightly build." ;;
            cancelled) emoji="⚠️"; msg="sbx **nightly** e2e was cancelled." ;;
            skipped)   emoji="⏭️"; msg="sbx **nightly** e2e was skipped (fork PR or no kits changed)." ;;
            *)         emoji="❔"; msg="sbx **nightly** e2e ended in an unexpected state: ${result}." ;;
          esac
          echo "${emoji} ${msg}"
          {
            echo "## ${emoji} Nightly e2e (non-blocking)"
            echo ""
            echo "${msg}"
          } >> "$GITHUB_STEP_SUMMARY"
