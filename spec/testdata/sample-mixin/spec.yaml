schemaVersion: "1"
kind: mixin
name: sample-mixin
version: "1.0.0"
displayName: Sample Mixin
description: "A test-only mixin that exercises every spec field the TCK validates"
sourceURL: https://example.com/sample-mixin

# Base-agent affinity: this mixin is designed for the sample-agent base.
requires:
  agent: sample-agent

network:
  allowedDomains:
    - example.com
    - "*.example.org"
  deniedDomains:
    - tracker.example.com
  serviceDomains:
    api.example.com: example
  serviceAuth:
    example:
      headerName: Authorization
      valueFormat: "Bearer %s"
  publishedPorts:
    - container: 9418
    - container: 8080
      protocol: tcp
      name: web
    - container: 53
      protocol: udp
      name: dns

credentials:
  sources:
    example:
      env:
        - EXAMPLE_API_KEY
      file:
        path: "~/.example/credentials.json"
        parser: "json:apiKey"
      priority: env-first

environment:
  variables:
    SAMPLE_HOME: /home/agent/.sample
    SAMPLE_MODE: test
  proxyManaged:
    - SAMPLE_PROXY_TOKEN

settings:
  containerSettings:
    enableFeatureX: true

commands:
  install:
    - command: "echo installed"
      user: "0"
      description: Sample install
  startup:
    - command: ["echo", "started"]
      user: "1000"
      background: true
      description: Sample startup
  initFiles:
    - path: /home/agent/.sample/init.conf
      content: "workdir=${WORKDIR}"
      mode: "0644"
      description: Sample init file
