schemaVersion: "1"
kind: agent
name: openhands
displayName: OpenHands Agent Canvas
description: "OpenHands Agent Canvas running inside a Docker Sandbox"

agent:
  image: "docker/sandbox-templates:shell-docker"
  entrypoint:
    run:
      - "/usr/local/bin/agent-canvas-wrapper"

network:
  allowedDomains:
    # OpenHands services
    - "install.openhands.dev:443"
    - "*.openhands.dev:443"
    # Package managers and Git
    - "github.com:443"
    - "api.github.com:443"
    - "objects.githubusercontent.com:443"
    - "raw.githubusercontent.com:443"
    - "pypi.org:443"
    - "files.pythonhosted.org:443"
    - "registry.npmjs.org:443"
    - "nodejs.org:443"
    - "astral.sh:443"
    - "*.astral.sh:443"
    # LLM Provider APIs
    - "api.anthropic.com:443"
    - "api.openai.com:443"
    - "generativelanguage.googleapis.com:443"
  serviceDomains:
    api.anthropic.com: anthropic
    api.openai.com: openai
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY
    openai:
      env:
        - OPENAI_API_KEY

environment:
  variables:
    WORKSPACE_DIR: "/workspace"
    PORT: "8000"
    # Clear the IPv6 proxy injected by the sandbox daemon so Python's httpx
    # doesn't crash trying to parse the [::1] address.
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    ALL_PROXY: ""
    http_proxy: ""
    https_proxy: ""
    all_proxy: ""
  proxyManaged:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY

commands:
  install:
    - command: "curl -LsSf https://astral.sh/uv/install.sh | sh && mv /root/.local/bin/uv /usr/local/bin/uv && mv /root/.local/bin/uvx /usr/local/bin/uvx"
      user: "0"
      description: "Install uv package manager system-wide"
    - command: "npm install -g n && n install 22"
      user: "0"
      description: "Upgrade Node.js to v22 for Agent Canvas"
    - command: "NPM_CONFIG_PREFIX=/usr/local/share/npm-global npm install -g @openhands/agent-canvas"
      user: "0"
      description: "Install OpenHands Agent Canvas via npm"
    - command: |
        cat > /usr/local/bin/agent-canvas-wrapper <<'EOF'
        #!/usr/bin/env node
        const { spawn } = require('child_process');
        const env = { ...process.env };
        for (const k of Object.keys(env)) {
            if (k.toLowerCase().includes('proxy') && env[k]) {
                env[k] = env[k].replace(/\[[a-fA-F0-9:]+\]/g, '127.0.0.1');
            }
        }
        const p = spawn('/usr/local/share/npm-global/bin/agent-canvas', process.argv.slice(2), { stdio: 'inherit', env });
        p.on('exit', (code, signal) => {
            if (signal) process.kill(process.pid, signal);
            process.exit(code ?? 0);
        });
        EOF
        chmod +x /usr/local/bin/agent-canvas-wrapper
      user: "0"
      description: "Create Node.js wrapper to fix Python httpx IPv6 proxy parsing bug"
    - command: "printf 'HTTP_PROXY=\nHTTPS_PROXY=\nALL_PROXY=\nhttp_proxy=\nhttps_proxy=\nall_proxy=\n' >> /etc/environment"
      user: "0"
      description: "Clear proxy vars in /etc/environment so all spawned Python subprocesses skip proxy"
